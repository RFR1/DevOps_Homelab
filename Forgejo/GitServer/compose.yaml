networks:
  forgejo:
    external: false

services:
  server:
    image: codeberg.org/forgejo/forgejo:13
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: unless-stopped
    networks:
      - forgejo
    volumes:
      - /home/user/data/forgejoData:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '3000:3000' # Web UI port
      - '222:22' # SSH port
